<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--bg-app); padding:22px 24px; }
  .live { display:flex; align-items:center; gap:12px; padding:11px 14px; background:var(--surface-panel);
    border:1px solid var(--border-default); border-radius:var(--radius-md); margin-bottom:18px; }
  .live .topic { font-family:var(--font-display); font-weight:600; font-size:13px; color:var(--text-strong); flex:none; }
  .live .sep { color:var(--text-dim); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { AgentStatus, AgentTrace } = window.AIStockAgentDesignSystem_ea6e23;
function Demo(){
  return (
    <div>
      <div className="live">
        <span className="topic">TSMC capacity</span><span className="sep">·</span>
        <AgentStatus phrases={[
          "Thinking…",
          "Researching advanced-node capacity…",
          "Reading 6 sources…",
          "Cross-checking the Jun 14 brief…",
          "Drafting findings…",
        ]} interval={2400} />
      </div>
      <AgentTrace steps={[
        { label: "Reconstructed context from your watchlist", tool: "memory.read", reuse: "Watchlist", inTok: "1.2k", outTok: "0.1k", at: "09:14:02", status: "done" },
        { label: "Searched advanced-packaging capex guidance", tool: "web.search", sources: ["reuters.com","bloomberg.com"], inTok: "8.4k", outTok: "0.6k", at: "09:14:20", status: "done" },
        { label: "Reading 6 sources", tool: "web.fetch", sources: ["ft.com","+4"], inTok: "12.1k", outTok: "0.3k", at: "09:14:41", status: "active" },
        { label: "Draft findings & significance score", status: "pending" },
      ]} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
