<!-- @dsCard group="Components" viewport="700x200" name="Market data" subtitle="Sparklines and quote rows — quiet, fact-first, no moving ticker" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; background:var(--bg-app); padding:22px 24px; }
  .sparks { display:flex; gap:22px; align-items:center; margin-bottom:18px; }
  .quotes { display:grid; gap:10px; max-width:420px; margin-bottom:18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Sparkline, PriceQuote } = window.AIStockAgentDesignSystem_ea6e23;
const up = [101,103,102,105,104,108,107,111,113,112,116];
const down = [88,87,89,85,86,82,83,80,78,79,75];
function Demo(){
  return (
    <div>
      <div className="sparks">
        <Sparkline data={up} width={130} height={40} />
        <Sparkline data={down} width={130} height={40} />
        <Sparkline data={up} width={130} height={40} color="var(--blue-500)" area={false} />
      </div>
      <div className="quotes">
        <PriceQuote symbol="BZ" name="Brent crude" price={94.10} changePct={6.40} series={up} />
        <PriceQuote symbol="NVDA" name="NVIDIA Corp" price={131.26} changePct={-2.80} series={down} />
        <PriceQuote symbol="TSM" name="Taiwan Semi" price={188.04} changePct={-2.10} series={down} />
        <PriceQuote symbol="^VIX" name="Volatility" price={19.20} changePct={21.0} showSpark={false} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
