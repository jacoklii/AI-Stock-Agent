# SPA + API proxy. The UI always calls /api/*; the prefix is stripped here (trailing slash on
# proxy_pass), mirroring the Vite dev proxy. Chat answers are long LLM calls — generous read
# timeout on the API path.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # FastAPI docs passthrough (handy on the VM behind basic auth).
    location = /openapi.json { proxy_pass http://api:8000; }
    location /docs { proxy_pass http://api:8000; }

    location / {
        try_files $uri /index.html;
    }
}
