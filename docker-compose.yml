x-api-env: &api-env
  env_file:
    - .env
  environment:
    DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-stockagent}:${POSTGRES_PASSWORD:-stockagent}@db:5432/${POSTGRES_DB:-stockagent}"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai-stock-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockagent}
      POSTGRES_DB: ${POSTGRES_DB:-stockagent}
    ports:
      # Loopback-only: on a VM the public ports are Caddy's; nothing bypasses its auth.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    # Persisted data lives under the repo's data folder (gitignored), per the repo structure.
    volumes:
      - ./backend/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockagent} -d ${POSTGRES_DB:-stockagent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: ./backend
    container_name: ai-stock-agent-migrate
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    <<: *api-env
    restart: "no"

  api:
    build: ./backend
    container_name: ai-stock-agent-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    <<: *api-env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # The SPA: nginx serving the built bundle, proxying /api/* to the api container.
  # Local entry point: http://localhost:3000 (no Caddy needed off-VM).
  web:
    build: ./frontend
    container_name: ai-stock-agent-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:80"

  # Production front door (VM only): TLS + basic auth. Start with:
  #   docker compose --profile prod up -d --build
  # DOMAIN / BASIC_AUTH_* ride in via env_file so the bcrypt hash is never interpolated.
  caddy:
    image: caddy:2-alpine
    container_name: ai-stock-agent-caddy
    profiles: ["prod"]
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
