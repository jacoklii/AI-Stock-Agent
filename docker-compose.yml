x-api-env: &api-env
  env_file:
    - .env
  environment:
    DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-stockagent}:${POSTGRES_PASSWORD:-stockagent}@db:5432/${POSTGRES_DB:-stockagent}"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ai-stock-agent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockagent}
      POSTGRES_DB: ${POSTGRES_DB:-stockagent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    # Persisted data lives under the repo's data folder (gitignored), per the repo structure.
    volumes:
      - ./src/backend/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockagent} -d ${POSTGRES_DB:-stockagent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: ./src/backend
    container_name: ai-stock-agent-migrate
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    <<: *api-env
    restart: "no"

  api:
    build: ./src/backend
    container_name: ai-stock-agent-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8000}:8000"
    <<: *api-env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
